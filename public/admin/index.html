<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 管家 - 後台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; }

    /* Login */
    .login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 320px; text-align: center; }
    .login-box h2 { margin-bottom: 1rem; }
    .login-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 10px; background: #4CAF50; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #45a049; }
    .login-error { color: #e53935; font-size: 14px; margin-top: 8px; display: none; }
    .login-hint { font-size: 12px; color: #999; margin-top: 8px; }

    /* Layout */
    .app { display: none; }
    header { background: #2196F3; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-user { font-size: 13px; opacity: .8; }
    header button { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

    /* Tabs */
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
    .tab { padding: 12px 16px; cursor: pointer; font-size: 14px; white-space: nowrap; border-bottom: 2px solid transparent; color: #666; }
    .tab.active { color: #2196F3; border-bottom-color: #2196F3; font-weight: 600; }

    /* Content */
    .content { padding: 16px; max-width: 800px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card h3 { margin-bottom: 12px; color: #333; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { font-weight: 600; color: #666; }

    /* Form */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #2196F3; color: #fff; }
    .btn-danger { background: #e53935; color: #fff; }
    .btn-success { background: #4CAF50; color: #fff; }
    .btn:hover { opacity: .9; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }

    /* Salary Report */
    .salary-report { white-space: pre-wrap; font-family: monospace; background: #fafafa; padding: 16px; border-radius: 8px; line-height: 1.6; font-size: 14px; }

    /* Nanny card */
    .nanny-card { border-left: 4px solid #2196F3; padding-left: 12px; margin-bottom: 16px; }
    .nanny-card .name { font-size: 16px; font-weight: 600; }
    .nanny-card .detail { font-size: 13px; color: #666; margin-top: 4px; }

    /* Status */
    .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-warn { background: #fff3e0; color: #e65100; }
    .status-info { background: #e3f2fd; color: #1565c0; }

    .loading { text-align: center; padding: 2rem; color: #999; }
    .month-selector { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
    .month-selector input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px; }
    .modal h3 { margin-bottom: 16px; }

    /* Setting item */
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .setting-item:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; font-weight: 500; }
    .setting-value { font-size: 14px; color: #666; }

    /* AI Usage */
    .usage-bar { height: 8px; border-radius: 4px; background: #e0e0e0; overflow: hidden; margin-top: 4px; }
    .usage-bar-fill { height: 100%; border-radius: 4px; background: #2196F3; }
    .usage-stat { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>

<!-- Login Page -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h2>AI 管家後台</h2>
    <input type="password" id="tokenInput" placeholder="請輸入管理密碼">
    <button onclick="doLogin()">登入</button>
    <div class="login-error" id="loginError">密碼錯誤</div>
    <div class="login-hint">或從 LINE 輸入「後台」取得登入連結</div>
  </div>
</div>

<!-- Main App -->
<div class="app" id="app">
  <header>
    <h1>AI 管家後台</h1>
    <div class="header-right">
      <span class="header-user" id="headerUser"></span>
      <button onclick="doLogout()">登出</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('settings')">設定</div>
    <div class="tab" onclick="switchTab('calendar')">行事曆</div>
    <div class="tab" onclick="switchTab('ai-usage')">AI 用量</div>
    <div class="tab" onclick="switchTab('salary')">薪資計算</div>
    <div class="tab" onclick="switchTab('nannies')">保母管理</div>
    <div class="tab" onclick="switchTab('holidays')">國定假日</div>
    <div class="tab" onclick="switchTab('records')">歷史紀錄</div>
  </div>

  <!-- Settings Tab -->
  <div class="content tab-content" id="tab-settings">
    <div class="card">
      <h3>基本設定</h3>
      <div id="settingsContent" class="loading">載入中...</div>
    </div>
    <div class="card">
      <h3>晨報設定</h3>
      <div id="briefingContent" class="loading">載入中...</div>
    </div>
    <div class="card">
      <h3>通勤路線</h3>
      <div id="commuteContent" class="loading">載入中...</div>
    </div>
  </div>

  <!-- Calendar Tab -->
  <div class="content tab-content" id="tab-calendar" style="display:none">
    <div class="card">
      <h3>Google 行事曆</h3>
      <div id="calendarContent" class="loading">載入中...</div>
    </div>
    <div class="card">
      <h3>家庭行事曆</h3>
      <div id="familyCalContent" class="loading">載入中...</div>
    </div>
  </div>

  <!-- AI Usage Tab -->
  <div class="content tab-content" id="tab-ai-usage" style="display:none">
    <div class="card">
      <h3>AI 用量統計</h3>
      <div class="month-selector">
        <select id="usageDays" onchange="loadAiUsage()">
          <option value="7">近 7 天</option>
          <option value="30" selected>近 30 天</option>
          <option value="90">近 90 天</option>
        </select>
      </div>
      <div id="aiUsageContent" class="loading">載入中...</div>
    </div>
  </div>

  <!-- Salary Tab -->
  <div class="content tab-content" id="tab-salary" style="display:none">
    <div class="card">
      <h3>月薪計算</h3>
      <div class="month-selector">
        <select id="salaryYear" style="min-width:90px"></select>
        <select id="salaryMonthSelect" style="min-width:80px"></select>
        <button class="btn btn-primary" onclick="calculateSalary()">計算薪資</button>
      </div>
      <div id="salaryResult" class="loading">選擇月份後按計算</div>
    </div>
  </div>

  <!-- Nannies Tab -->
  <div class="content tab-content" id="tab-nannies" style="display:none">
    <div class="card">
      <h3>保母列表</h3>
      <div id="nannyList"></div>
      <button class="btn btn-primary" onclick="showNannyModal()" style="margin-top:12px">+ 新增保母</button>
    </div>
  </div>

  <!-- Holidays Tab -->
  <div class="content tab-content" id="tab-holidays" style="display:none">
    <div class="card">
      <h3>國定假日</h3>
      <div class="month-selector">
        <select id="holidayYear" onchange="loadHolidays()">
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
          <option value="2027">2027</option>
        </select>
        <button class="btn btn-success btn-sm" onclick="addHoliday()">+ 新增假日</button>
      </div>
      <div id="holidayList"></div>
      <button class="btn btn-primary" onclick="saveHolidays()" style="margin-top:12px">儲存假日</button>
    </div>
  </div>

  <!-- Records Tab -->
  <div class="content tab-content" id="tab-records" style="display:none">
    <div class="card">
      <h3>計算紀錄</h3>
      <div id="recordsList"></div>
    </div>
  </div>
</div>

<!-- Nanny Edit Modal -->
<div class="modal-overlay" id="nannyModal">
  <div class="modal">
    <h3 id="nannyModalTitle">新增保母</h3>
    <div class="form-group">
      <label>ID（英文代號）</label>
      <input type="text" id="nf_id" placeholder="例如 wendy">
    </div>
    <div class="form-group">
      <label>名稱</label>
      <input type="text" id="nf_name" placeholder="例如 Wendy">
    </div>
    <div class="form-group">
      <label>底薪（NT$）</label>
      <input type="number" id="nf_baseSalary" placeholder="40000">
    </div>
    <div class="form-group">
      <label>加班費（NT$，無則填 0）</label>
      <input type="number" id="nf_overtimeAllowance" placeholder="50000">
    </div>
    <div class="form-group">
      <label>請假扣款來源</label>
      <select id="nf_leaveDeductFrom">
        <option value="overtime">扣加班費</option>
        <option value="base">扣底薪</option>
      </select>
    </div>
    <div class="form-group">
      <label>行事曆請假關鍵字</label>
      <input type="text" id="nf_leaveKeyword" placeholder="例如 Wendy休假">
    </div>
    <div class="form-group">
      <label>備註</label>
      <input type="text" id="nf_notes" placeholder="例如 24小時看護">
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveNanny()">儲存</button>
      <button class="btn" onclick="closeNannyModal()" style="background:#eee">取消</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <h3 id="payModalTitle">發放薪資</h3>
    <div class="form-group">
      <label>發放日期</label>
      <input type="date" id="pay_date">
    </div>
    <div class="form-group">
      <label>實付金額（NT$）</label>
      <input type="number" id="pay_amount">
    </div>
    <div class="form-group">
      <label>備註（選填）</label>
      <input type="text" id="pay_note" placeholder="例如：轉帳/現金">
    </div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="confirmPay()">確認發放</button>
      <button class="btn" onclick="closePayModal()" style="background:#eee">取消</button>
    </div>
  </div>
</div>

<!-- Commute Route Modal -->
<div class="modal-overlay" id="commuteModal">
  <div class="modal">
    <h3>新增通勤路線</h3>
    <div class="form-group">
      <label>路線名稱</label>
      <input type="text" id="cr_name" placeholder="例如 上班路線">
    </div>
    <div class="form-group">
      <label>起點地址</label>
      <input type="text" id="cr_origin" placeholder="例如 台北市信義區...">
    </div>
    <div class="form-group">
      <label>終點地址</label>
      <input type="text" id="cr_destination" placeholder="例如 新北市板橋區...">
    </div>
    <div class="form-group">
      <label>通知時間</label>
      <input type="time" id="cr_notifyTime" value="08:15">
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="cr_weekdayOnly" checked>
      <label for="cr_weekdayOnly" style="margin:0">僅平日通知</label>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveCommuteRoute()">儲存</button>
      <button class="btn" onclick="closeCommuteModal()" style="background:#eee">取消</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api/nanny';
const USER_API = '/api/user';
let token = localStorage.getItem('admin_token') || '';
let currentHolidays = [];

// ========== Auth ==========
function getHeaders() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}

// Check URL for JWT token (from LINE bot link)
function checkUrlToken() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (urlToken) {
    token = urlToken;
    localStorage.setItem('admin_token', token);
    // Clean URL
    window.history.replaceState({}, '', window.location.pathname);
    return true;
  }
  return false;
}

async function doLogin() {
  token = document.getElementById('tokenInput').value;
  try {
    const res = await fetch(API_BASE + '/nannies', { headers: getHeaders() });
    if (res.ok) {
      localStorage.setItem('admin_token', token);
      showApp();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('admin_token');
  token = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

async function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initMonthSelector();
  // Load all data
  loadProfile();
  loadSettings();
  loadBriefing();
  loadCommuteRoutes();
  loadCalendarStatus();
  loadFamilyCalendars();
  loadAiUsage();
  loadNannies();
  loadHolidays();
  loadRecords();
}

async function loadProfile() {
  try {
    const res = await fetch(USER_API + '/profile', { headers: getHeaders() });
    const data = await res.json();
    if (data.user) {
      document.getElementById('headerUser').textContent = data.user.displayName || '';
    }
  } catch (e) {}
}

function initMonthSelector() {
  const now = new Date();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth() + 1;
  const yearSelect = document.getElementById('salaryYear');
  yearSelect.innerHTML = '';
  for (let y = curYear - 1; y <= curYear + 1; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + ' 年';
    if (y === curYear) opt.selected = true;
    yearSelect.appendChild(opt);
  }
  const monthSelect = document.getElementById('salaryMonthSelect');
  monthSelect.innerHTML = '';
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = String(m).padStart(2, '0');
    opt.textContent = m + ' 月';
    if (m === curMonth) opt.selected = true;
    monthSelect.appendChild(opt);
  }
}

function getSelectedMonth() {
  const y = document.getElementById('salaryYear').value;
  const m = document.getElementById('salaryMonthSelect').value;
  return y + '-' + m;
}

// ========== Tabs ==========
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  event.target.classList.add('active');
  document.getElementById('tab-' + name).style.display = 'block';
}

// ========== Settings ==========
async function loadSettings() {
  try {
    const res = await fetch(USER_API + '/settings', { headers: getHeaders() });
    const data = await res.json();
    const s = data.settings;
    const el = document.getElementById('settingsContent');
    if (!s) {
      el.innerHTML = '<div class="loading">尚未設定</div>';
      return;
    }
    el.innerHTML = `
      <div class="form-group">
        <label>預設城市</label>
        <input type="text" id="set_defaultCity" value="${escapeHtml(s.defaultCity || '')}" placeholder="臺北市">
      </div>
      <div class="form-group">
        <label>時區</label>
        <input type="text" id="set_timezone" value="${escapeHtml(s.timezone || 'Asia/Taipei')}" placeholder="Asia/Taipei">
      </div>
      <div class="form-group">
        <label>行程提醒（分鐘前）</label>
        <input type="number" id="set_eventReminderMin" value="${s.eventReminderMin || 120}">
      </div>
      <div class="form-group">
        <label>行程提醒起點地址</label>
        <input type="text" id="set_eventReminderOrigin" value="${escapeHtml(s.eventReminderOrigin || '')}" placeholder="例如 家裡地址">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
      </div>
    `;
  } catch (e) {
    document.getElementById('settingsContent').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

async function saveSettings() {
  try {
    const data = {
      defaultCity: document.getElementById('set_defaultCity').value.trim(),
      timezone: document.getElementById('set_timezone').value.trim(),
      eventReminderMin: parseInt(document.getElementById('set_eventReminderMin').value) || 120,
      eventReminderOrigin: document.getElementById('set_eventReminderOrigin').value.trim() || null,
    };
    await fetch(USER_API + '/settings', { method: 'PUT', headers: getHeaders(), body: JSON.stringify(data) });
    alert('設定已儲存');
  } catch (e) { alert('儲存失敗：' + e.message); }
}

// ========== Briefing ==========
async function loadBriefing() {
  try {
    const res = await fetch(USER_API + '/briefing', { headers: getHeaders() });
    const data = await res.json();
    const c = data.config;
    const el = document.getElementById('briefingContent');
    el.innerHTML = `
      <div class="form-group" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="br_enabled" ${c?.enabled ? 'checked' : ''}>
        <label for="br_enabled" style="margin:0">啟用每日晨報</label>
      </div>
      <div class="form-group">
        <label>推播時間</label>
        <input type="time" id="br_time" value="${c?.time || '07:00'}">
      </div>
      <div class="form-group">
        <label>天氣城市（逗號分隔）</label>
        <input type="text" id="br_cities" value="${escapeHtml(c?.cities || '')}" placeholder="臺北市,桃園">
      </div>
      <div class="form-group">
        <label>新聞區塊（region:category:count）</label>
        <input type="text" id="br_news" value="${escapeHtml(c?.newsSections || '')}" placeholder="tw:general:5">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveBriefing()">儲存晨報設定</button>
      </div>
    `;
  } catch (e) {
    document.getElementById('briefingContent').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

async function saveBriefing() {
  try {
    const data = {
      enabled: document.getElementById('br_enabled').checked,
      time: document.getElementById('br_time').value,
      cities: document.getElementById('br_cities').value.trim(),
      newsSections: document.getElementById('br_news').value.trim(),
    };
    await fetch(USER_API + '/briefing', { method: 'PUT', headers: getHeaders(), body: JSON.stringify(data) });
    alert('晨報設定已儲存');
  } catch (e) { alert('儲存失敗：' + e.message); }
}

// ========== Commute Routes ==========
async function loadCommuteRoutes() {
  try {
    const res = await fetch(USER_API + '/commute/routes', { headers: getHeaders() });
    const data = await res.json();
    const el = document.getElementById('commuteContent');
    const routes = data.routes || [];
    if (routes.length === 0) {
      el.innerHTML = '<div class="loading">尚未設定通勤路線</div>';
    } else {
      el.innerHTML = routes.map(r => `
        <div class="nanny-card">
          <div class="name">${escapeHtml(r.name)}</div>
          <div class="detail">${escapeHtml(r.origin)} → ${escapeHtml(r.destination)}</div>
          <div class="detail">通知：${r.notifyTime} ${r.weekdayOnly ? '(平日)' : '(每日)'}</div>
          <button class="btn btn-danger btn-sm" onclick="deleteCommuteRoute('${r.id}')" style="margin-top:6px">刪除</button>
        </div>
      `).join('');
    }
    el.innerHTML += '<button class="btn btn-primary btn-sm" onclick="showCommuteModal()" style="margin-top:8px">+ 新增路線</button>';
  } catch (e) {
    document.getElementById('commuteContent').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

function showCommuteModal() { document.getElementById('commuteModal').classList.add('active'); }
function closeCommuteModal() { document.getElementById('commuteModal').classList.remove('active'); }

async function saveCommuteRoute() {
  try {
    const data = {
      name: document.getElementById('cr_name').value.trim(),
      origin: document.getElementById('cr_origin').value.trim(),
      destination: document.getElementById('cr_destination').value.trim(),
      notifyTime: document.getElementById('cr_notifyTime').value,
      weekdayOnly: document.getElementById('cr_weekdayOnly').checked,
    };
    if (!data.name || !data.origin || !data.destination) { alert('名稱、起點、終點為必填'); return; }
    await fetch(USER_API + '/commute/routes', { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
    closeCommuteModal();
    loadCommuteRoutes();
  } catch (e) { alert('儲存失敗：' + e.message); }
}

async function deleteCommuteRoute(id) {
  if (!confirm('確定刪除此路線？')) return;
  try {

// ========== AI Usage ==========
async function loadAiUsage() {
  const days = document.getElementById('usageDays').value;
  try {
    const res = await fetch(USER_API + '/ai-usage?days=' + days, { headers: getHeaders() });
    const data = await res.json();
    const el = document.getElementById('aiUsageContent');
    const u = data.usage;
    if (!u || (!u.totalCost && !u.totalInputTokens)) {
      el.innerHTML = '<div class="loading">尚無使用記錄</div>';
      return;
    }
    let html = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div style="background:#e3f2fd;padding:16px;border-radius:8px;text-align:center">
          <div style="font-size:24px;font-weight:700;color:#1565c0">$${(u.totalCost || 0).toFixed(4)}</div>
          <div style="font-size:12px;color:#666;margin-top:4px">總費用 (USD)</div>
        </div>
        <div style="background:#e8f5e9;padding:16px;border-radius:8px;text-align:center">
          <div style="font-size:24px;font-weight:700;color:#2e7d32">${formatTokens(u.totalInputTokens + u.totalOutputTokens)}</div>
          <div style="font-size:12px;color:#666;margin-top:4px">總 Token 數</div>
        </div>
      </div>
    `;

    // Per-provider breakdown
    if (u.byProvider && u.byProvider.length > 0) {
      html += '<h4 style="margin-bottom:8px">按模型分類</h4>';
      for (const p of u.byProvider) {
        html += `
          <div style="margin-bottom:12px;padding:8px;background:#fafafa;border-radius:6px">
            <div style="font-weight:600">${escapeHtml(p.provider)} — ${escapeHtml(p.model || '')}</div>
            <div class="usage-stat">
              <span>Input: ${formatTokens(p.inputTokens)}</span>
              <span>Output: ${formatTokens(p.outputTokens)}</span>
              <span>$${(p.cost || 0).toFixed(4)}</span>
            </div>
          </div>
        `;
      }
    }

    // Daily breakdown
    if (u.daily && u.daily.length > 0) {
      html += '<h4 style="margin:16px 0 8px">每日用量</h4>';
      html += '<table><tr><th>日期</th><th>Input</th><th>Output</th><th>費用</th></tr>';
      for (const d of u.daily.slice(-14)) {
        html += `<tr><td>${d.date}</td><td>${formatTokens(d.inputTokens)}</td><td>${formatTokens(d.outputTokens)}</td><td>$${(d.cost || 0).toFixed(4)}</td></tr>`;
      }
      html += '</table>';
    }

    el.innerHTML = html;
  } catch (e) {
    document.getElementById('aiUsageContent').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

function formatTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

// ========== Salary ==========
let lastSalaryRecords = [];

async function calculateSalary() {
  const month = getSelectedMonth();
  if (!month) return;
  document.getElementById('salaryResult').innerHTML = '<div class="loading">計算中...</div>';
  try {
    const res = await fetch(API_BASE + '/salary/all/' + month, { headers: getHeaders() });
    const data = await res.json();
    lastSalaryRecords = data.records || [];
    if (data.text) {
      let html = '<div class="salary-report">' + escapeHtml(data.text) + '</div>';
      if (lastSalaryRecords.length > 0) {
        html += '<div style="margin-top:16px">';
        for (const r of lastSalaryRecords) {
          if (r.error) continue;
          const isPaid = !!r.paid;
          html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:8px;background:${isPaid ? '#e8f5e9' : '#fff3e0'};border-radius:8px">`;
          html += `<div><strong>${escapeHtml(r.nannyName)}</strong> — NT$ ${(r.finalSalary||0).toLocaleString()}</div>`;
          if (isPaid) {
            html += `<div style="display:flex;align-items:center;gap:8px"><span class="status status-ok">已發放 ${r.paidAt ? new Date(r.paidAt).toLocaleDateString('zh-TW') : ''}</span>`;
            html += `<button class="btn btn-sm" style="background:#eee" onclick="markUnpaid('${r.id}')">撤銷</button></div>`;
          } else {
            html += `<button class="btn btn-success btn-sm" onclick="showPayModal('${r.id}','${escapeHtml(r.nannyName)}',${r.finalSalary||0})">標記已發放</button>`;
          }
          html += '</div>';
        }
        html += '</div>';
      }
      document.getElementById('salaryResult').innerHTML = html;
    } else if (data.error) {
      document.getElementById('salaryResult').innerHTML = '<div style="color:#e53935">' + escapeHtml(data.error) + '</div>';
    }
  } catch (e) {
    document.getElementById('salaryResult').innerHTML = '<div style="color:#e53935">錯誤：' + e.message + '</div>';
  }
}

// ========== Payment ==========
let payModalRecordId = '';

function showPayModal(recordId, nannyName, amount) {
  payModalRecordId = recordId;
  document.getElementById('payModalTitle').textContent = '發放薪資 — ' + nannyName;
  document.getElementById('pay_amount').value = amount;
  document.getElementById('pay_date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('pay_note').value = '';
  document.getElementById('payModal').classList.add('active');
}

function closePayModal() {
  document.getElementById('payModal').classList.remove('active');
}

async function confirmPay() {
  const amount = parseInt(document.getElementById('pay_amount').value) || 0;
  const paidAt = document.getElementById('pay_date').value;
  const note = document.getElementById('pay_note').value.trim();
  try {
    await fetch(API_BASE + '/records/' + encodeURIComponent(payModalRecordId) + '/paid', {
      method: 'PUT', headers: getHeaders(),
      body: JSON.stringify({ amount, paidAt: paidAt + 'T00:00:00+08:00', note })
    });
    closePayModal();
    calculateSalary();
    loadRecords();
  } catch (e) { alert('標記失敗：' + e.message); }
}

async function markUnpaid(recordId) {
  if (!confirm('確定撤銷已發放標記？')) return;
  try {
    await fetch(API_BASE + '/records/' + encodeURIComponent(recordId) + '/unpaid', {
      method: 'PUT', headers: getHeaders()
    });
    calculateSalary();
    loadRecords();
  } catch (e) { alert('撤銷失敗：' + e.message); }
}

// ========== Nannies ==========
async function loadNannies() {
  try {
    const res = await fetch(API_BASE + '/nannies', { headers: getHeaders() });
    const data = await res.json();
    const list = document.getElementById('nannyList');
    if (!data.nannies || data.nannies.length === 0) {
      list.innerHTML = '<div class="loading">尚未設定保母</div>';
      return;
    }
    list.innerHTML = data.nannies.map(n => `
      <div class="nanny-card">
        <div class="name">${escapeHtml(n.name)}</div>
        <div class="detail">
          底薪 NT$ ${(n.baseSalary||0).toLocaleString()}
          ${n.overtimeAllowance ? ' + 加班費 NT$ ' + n.overtimeAllowance.toLocaleString() : ''}
        </div>
        <div class="detail">請假關鍵字：${escapeHtml(n.leaveKeyword||'-')} | ${escapeHtml(n.notes||'')}</div>
        <div class="btn-group">
          <button class="btn btn-primary btn-sm" onclick='editNanny(${JSON.stringify(n)})'>編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteNanny('${n.id}')">刪除</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('nannyList').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

function showNannyModal(nanny) {
  document.getElementById('nannyModalTitle').textContent = nanny ? '編輯保母' : '新增保母';
  document.getElementById('nf_id').value = nanny?.id || '';
  document.getElementById('nf_id').disabled = !!nanny;
  document.getElementById('nf_name').value = nanny?.name || '';
  document.getElementById('nf_baseSalary').value = nanny?.baseSalary || '';
  document.getElementById('nf_overtimeAllowance').value = nanny?.overtimeAllowance || 0;
  document.getElementById('nf_leaveDeductFrom').value = nanny?.leaveDeductFrom || 'base';
  document.getElementById('nf_leaveKeyword').value = nanny?.leaveKeyword || '';
  document.getElementById('nf_notes').value = nanny?.notes || '';
  document.getElementById('nannyModal').classList.add('active');
}

function editNanny(nanny) { showNannyModal(nanny); }
function closeNannyModal() { document.getElementById('nannyModal').classList.remove('active'); }

async function saveNanny() {
  const data = {
    id: document.getElementById('nf_id').value.trim(),
    name: document.getElementById('nf_name').value.trim(),
    baseSalary: parseInt(document.getElementById('nf_baseSalary').value) || 0,
    overtimeAllowance: parseInt(document.getElementById('nf_overtimeAllowance').value) || 0,
    leaveDeductFrom: document.getElementById('nf_leaveDeductFrom').value,
    leaveKeyword: document.getElementById('nf_leaveKeyword').value.trim(),
    notes: document.getElementById('nf_notes').value.trim(),
  };
  if (!data.id || !data.name) { alert('ID 和名稱為必填'); return; }
  try {
    await fetch(API_BASE + '/nannies', { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
    closeNannyModal();
    loadNannies();
  } catch (e) { alert('儲存失敗：' + e.message); }
}

async function deleteNanny(id) {
  if (!confirm('確定刪除？')) return;
  try {
    await fetch(API_BASE + '/nannies/' + id, { method: 'DELETE', headers: getHeaders() });
    loadNannies();
  } catch (e) { alert('刪除失敗：' + e.message); }
}

// ========== Holidays ==========
async function loadHolidays() {
  const year = document.getElementById('holidayYear').value;
  try {
    const res = await fetch(API_BASE + '/holidays/' + year, { headers: getHeaders() });
    const data = await res.json();
    currentHolidays = data.holidays || [];
    renderHolidays();
  } catch (e) {
    document.getElementById('holidayList').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

function renderHolidays() {
  const list = document.getElementById('holidayList');
  if (currentHolidays.length === 0) {
    list.innerHTML = '<div class="loading">無假日資料</div>';
    return;
  }
  list.innerHTML = '<table><tr><th>日期</th><th>名稱</th><th></th></tr>' +
    currentHolidays.map((h, i) => `
      <tr>
        <td><input type="date" value="${h.date}" onchange="currentHolidays[${i}].date=this.value" style="border:1px solid #ddd;padding:4px;border-radius:4px"></td>
        <td><input type="text" value="${escapeHtml(h.name)}" onchange="currentHolidays[${i}].name=this.value" style="border:1px solid #ddd;padding:4px;border-radius:4px;width:120px"></td>
        <td><button class="btn btn-danger btn-sm" onclick="removeHoliday(${i})">x</button></td>
      </tr>
    `).join('') + '</table>';
}

function addHoliday() {
  const year = document.getElementById('holidayYear').value;
  currentHolidays.push({ date: year + '-01-01', name: '新假日' });
  renderHolidays();
}

function removeHoliday(idx) {
  currentHolidays.splice(idx, 1);
  renderHolidays();
}

async function saveHolidays() {
  const year = document.getElementById('holidayYear').value;
  try {
    await fetch(API_BASE + '/holidays/' + year, {
      method: 'PUT', headers: getHeaders(),
      body: JSON.stringify({ holidays: currentHolidays })
    });
    alert('已儲存');
  } catch (e) { alert('儲存失敗：' + e.message); }
}

// ========== Records ==========
async function loadRecords() {
  try {
    const res = await fetch(API_BASE + '/records?limit=50', { headers: getHeaders() });
    const data = await res.json();
    const list = document.getElementById('recordsList');
    if (!data.records || data.records.length === 0) {
      list.innerHTML = '<div class="loading">尚無計算紀錄</div>';
      return;
    }
    list.innerHTML = '<table><tr><th>月份</th><th>保母</th><th>薪資</th><th>狀態</th><th>發放日期</th><th></th></tr>' +
      data.records.map(r => {
        const isPaid = !!r.paid;
        const statusHtml = isPaid
          ? '<span class="status status-ok">已發放</span>'
          : '<span class="status status-warn">未發放</span>';
        const paidDate = r.paidAt ? new Date(r.paidAt).toLocaleDateString('zh-TW') : '-';
        const actionHtml = isPaid
          ? `<button class="btn btn-sm" style="background:#eee" onclick="markUnpaid('${r.id}')">撤銷</button>`
          : `<button class="btn btn-success btn-sm" onclick="showPayModal('${r.id}','${escapeHtml(r.nannyName||r.nannyId)}',${r.finalSalary||0})">發放</button>`;
        const noteHtml = r.paymentNote ? `<br><small style="color:#888">${escapeHtml(r.paymentNote)}</small>` : '';
        return `
          <tr>
            <td>${r.month}</td>
            <td>${escapeHtml(r.nannyName||r.nannyId)}</td>
            <td>NT$ ${(r.finalSalary||0).toLocaleString()}${r.paidAmount && r.paidAmount !== r.finalSalary ? '<br><small style="color:#e65100">實付 NT$ ' + r.paidAmount.toLocaleString() + '</small>' : ''}</td>
            <td>${statusHtml}${noteHtml}</td>
            <td>${paidDate}</td>
            <td>${actionHtml}</td>
          </tr>`;
      }).join('') + '</table>';
  } catch (e) {
    document.getElementById('recordsList').innerHTML = '<div style="color:#e53935">載入失敗</div>';
  }
}

// ========== Utils ==========
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
